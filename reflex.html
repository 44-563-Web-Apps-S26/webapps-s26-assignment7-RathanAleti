<!DOCTYPE html>
<html lang="en">
<head>
<title>Reflex Game</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>

</head>

<body>

<h1>Rathan reflexes</h1>

<h2>Timeout - Red in 3 seconds</h2>

<button class="btn btn-primary" onclick="buttonPress2()">
Click me change the color.
</button>

<p id="colorTarget">I will become red</p>

<script>
function buttonPress1() {
  setTimeout(function(){
    document.getElementById('colorTarget').style.color = "red"
  },3000)
}

function buttonPress2() {
  setTimeout(()=>{
    document.getElementById('colorTarget').style.color = "red"
  },3000)
}
</script>


<div id="target">Your time</div>
<div id="counter">Count</div>

<button onclick="beginTime()">Go</button>
<button onclick="recordTime()">Halt</button>

<script>

let haltTime = undefined

function recordTime(){
    haltTime = Date.now()
}

function beginTime(){

    haltTime = undefined

    for(let i=0;i<6;i++){

        setTimeout(function(){
            document.getElementById("counter").innerHTML = i
        },(5-i)*1000)

    }

    setTimeout(function(){

        if(haltTime == undefined){
            document.getElementById("target").innerHTML = "Not soon enough"
        }

        else{

            let targetTime = Date.now()
            let elapsed = targetTime - haltTime

            document.getElementById("target").innerHTML = "Time was " + elapsed

        }

    },5000)

}

</script>

</body>
</html>
