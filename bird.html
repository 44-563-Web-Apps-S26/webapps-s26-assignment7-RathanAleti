        <p id="score"> Score is zero.</p>
        <p onclick="help()">Click for help.</p>

<div>

</div>
<script>

let ids = [
"img0","img1","img2","img3","img4","img5","img6",
"img7","img8","img9","img10","img11","img12","img13",
"img14","img15","img16","img17","img18","img19","img20",
"img21","img22","img23","img24","img25","img26","img27",
"img28","img29","img30","img31","img32","img33","img34"
]

let score = 0
let locationsVisited = 0
let lastLocation = 0

let statueLocation = 19
let toucanLocation = 14

let lorikeetLocations = [3,25]
let buntingLocations = [2,5,11,20,21]

let gameOver = false

function check(position){

if(gameOver){
return
}

let id = ids[position]
let image = document.getElementById(id)

if(position == statueLocation){
image.src = "statue.jpeg"
score -= 3
gameOver = true
}

else if(position == toucanLocation){
image.src = "toucan.jpeg"
score += 5
}

else if(lorikeetLocations.includes(position)){
image.src = "lorikeet.jpeg"
score += 3
}

else if(buntingLocations.includes(position)){
image.src = "bunting.jpg"
score += 1
}

else{
image.src = "bush.jpg"
}

image.onclick = ""

locationsVisited++
lastLocation = position

document.getElementById("locations").innerHTML =
"Number of locations checked is " + locationsVisited

document.getElementById("score").innerHTML =
"Score is " + score

}
function help(){

let neighbors = [
(lastLocation+1)%35,
(lastLocation+34)%35,
(lastLocation+7)%35,
(lastLocation+28)%35
]

for(let n of neighbors){
if(buntingLocations.includes(n)){
document.getElementById("help").innerHTML = "cheep"
return
}
}

if(Math.abs(lastLocation - toucanLocation) <= 8){
document.getElementById("help").innerHTML = "caw"
return
}

if(Math.abs(lastLocation - statueLocation) <= 8){
document.getElementById("help").innerHTML = "thrrum"
return
}

document.getElementById("help").innerHTML = "silence"

}

</script>
